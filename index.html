<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>当头炮布局谱训练 · 重制版</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', 'SimHei', 'PingFang SC', sans-serif;
  background: #2c1810;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  padding: 10px;
}
#app {
  background: #d4a574;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.6), inset 0 0 0 2px #c49565;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  max-width: 900px;
  width: 100%;
  margin: 0 auto;
}
#left-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 0 0 auto;
  width: 100%;
  max-width: 520px;
  margin: 0 auto;
}
#header {
  text-align: center;
  margin-bottom: 12px;
  width: 100%;
}
#header h1 { font-size: clamp(18px, 5vw, 24px); color: #5c2e00; text-shadow: 1px 1px 0 rgba(255,200,100,0.3); }
#opening-name {
  font-size: clamp(14px, 3.5vw, 18px); color: #7a3b00; margin-top: 4px; min-height: 24px;
  font-weight: bold; letter-spacing: 2px;
}
#board-wrapper {
  position: relative;
  width: 100%;
  max-width: 508px;
  aspect-ratio: 508 / 550;
}
#board-canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  border-radius: 4px;
}
#pieces-container {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
.piece {
  position: absolute;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: bold;
  cursor: pointer; pointer-events: all;
  transform: translate(-50%, -50%);
  transition: left 0.15s, top 0.15s, box-shadow 0.1s;
  border: 2px solid;
  box-shadow: 2px 3px 6px rgba(0,0,0,0.35), inset 0 1px 2px rgba(255,255,255,0.3);
  z-index: 10;
  -webkit-tap-highlight-color: transparent;
}
.piece:active { filter: brightness(1.1); }
.piece.selected { box-shadow: 0 0 0 3px #ffe44d, 0 0 12px #ffd700, 2px 3px 6px rgba(0,0,0,0.35); z-index: 20; }
.piece.red {
  background: radial-gradient(circle at 35% 35%, #fff0e0, #f5d6c6 40%, #e8c8b0 80%, #dbb8a0);
  color: #b22222; border-color: #b22222;
  text-shadow: 0 1px 1px rgba(255,200,150,0.5);
}
.piece.black {
  background: radial-gradient(circle at 35% 35%, #f0ece8, #d8d0c8 40%, #c0b8b0 80%, #a8a098);
  color: #1a1a2e; border-color: #1a1a2e;
  text-shadow: 0 1px 1px rgba(255,255,255,0.3);
}
.hint-dot {
  position: absolute; border-radius: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer; pointer-events: all;
  z-index: 5;
  animation: pulse 1.5s infinite;
  -webkit-tap-highlight-color: transparent;
}
.hint-dot:active { transform: translate(-50%, -50%) scale(1.3); }
@keyframes pulse {
  0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
}
/* Teaching mode square highlights */
.square-highlight {
  position: absolute; border-radius: 4px;
  transform: translate(-50%, -50%);
  pointer-events: none; z-index: 4;
  border: 2.5px solid transparent;
}
.square-highlight.from {
  border-color: #ffd700;
  background: rgba(255,215,0,0.15);
  width: 90%; height: 90%;
}
.square-highlight.to {
  border-color: #00e68a;
  background: rgba(0,230,138,0.2);
  width: 100%; height: 100%;
  animation: highlightPulse 1s infinite alternate;
}
@keyframes highlightPulse {
  from { box-shadow: 0 0 0 2px rgba(0,230,138,0.3); }
  to   { box-shadow: 0 0 0 6px rgba(0,230,138,0.6); }
}

#sidebar {
  flex: 1 1 220px;
  min-width: 200px;
  display: flex; flex-direction: column; gap: 10px;
}
#controls { display: flex; flex-wrap: wrap; gap: 6px; }
#controls button {
  padding: 10px 12px; border: none; border-radius: 8px;
  font-size: clamp(12px, 3vw, 14px); font-family: inherit; cursor: pointer;
  background: #c49565; color: #3a1e00;
  border: 1px solid #b08050;
  transition: background 0.15s, transform 0.1s;
  flex: 1; min-width: 60px;
  -webkit-tap-highlight-color: transparent;
}
#controls button:hover { background: #b88858; }
#controls button:active { transform: translateY(0); background: #b08050; }
#controls button.primary { background: #b22222; color: #fff; border-color: #8a1a1a; }
#controls button.teaching { background: #2e7d32; color: #fff; border-color: #1b5e20; }
#controls button.teaching.active { background: #1b5e20; }
#controls button:disabled { opacity: 0.4; cursor: default; transform: none; }

#move-history {
  background: rgba(0,0,0,0.08); border-radius: 8px; padding: 10px;
  min-height: 80px; max-height: 180px; overflow-y: auto;
}
#move-history h3 { font-size: clamp(12px, 3vw, 14px); color: #5c2e00; margin-bottom: 6px; }
#move-list { list-style: none; display: flex; flex-wrap: wrap; gap: 2px 0; font-size: clamp(11px, 2.8vw, 13px); }
#move-list li { padding: 2px 6px; border-radius: 3px; color: #3a1e00; width: 50%; }
#move-list li .num { color: #7a5a3a; margin-right: 4px; }
#move-list li.active { background: rgba(0,200,80,0.2); font-weight: bold; }

#variations {
  background: rgba(0,0,0,0.08); border-radius: 8px; padding: 10px;
  min-height: 40px;
}
#variations h3 { font-size: clamp(12px, 3vw, 14px); color: #5c2e00; margin-bottom: 6px; }
.var-btn {
  display: inline-block; padding: 5px 10px; margin: 2px;
  border: 1px solid #b08050; border-radius: 6px;
  background: rgba(255,255,255,0.3); cursor: pointer;
  font-size: clamp(11px, 2.8vw, 12px); color: #3a1e00; white-space: nowrap;
}
.var-btn:active { background: rgba(255,255,255,0.6); }
.var-btn .tag { font-size: 10px; color: #b22222; margin-left: 4px; }

#teaching-panel {
  background: rgba(0,0,0,0.08); border-radius: 8px; padding: 10px;
  min-height: 50px; display: none;
}
#teaching-panel.visible { display: block; }
#teaching-panel h3 { font-size: clamp(12px, 3vw, 14px); color: #5c2e00; margin-bottom: 4px; }
#move-desc { font-size: clamp(13px, 3.2vw, 15px); color: #3a1e00; font-weight: bold; margin-bottom: 4px; }
#annotation-text {
  font-size: clamp(11px, 2.8vw, 13px); color: #5c2e00;
  padding: 6px 8px; background: rgba(255,215,0,0.12); border-radius: 6px;
  border-left: 3px solid #b8860b; margin-top: 4px; line-height: 1.5;
  white-space: pre-wrap;
}

#status-bar {
  margin-top: 6px;
  font-size: clamp(12px, 3vw, 14px); color: #5c2e00;
  min-height: 22px; text-align: center;
}

/* Off-book dialog overlay */
#dialog-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 100;
  align-items: center; justify-content: center;
}
#dialog-overlay.visible { display: flex; }
#dialog-box {
  background: #d4a574; border-radius: 12px; padding: 20px 24px;
  max-width: 360px; width: 90%; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  text-align: center;
}
#dialog-box p { font-size: 14px; color: #3a1e00; margin-bottom: 6px; line-height: 1.6; }
#dialog-box .sub { font-size: 12px; color: #7a5a3a; margin-bottom: 12px; }
#dialog-box .book-move { font-size: 15px; color: #b22222; font-weight: bold; margin: 8px 0; }
#dialog-box .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
#dialog-box button {
  padding: 8px 16px; border: none; border-radius: 8px;
  font-size: 13px; font-family: inherit; cursor: pointer;
  background: #c49565; color: #3a1e00; border: 1px solid #b08050;
}
#dialog-box button.primary { background: #b22222; color: #fff; border-color: #8a1a1a; }
#dialog-box button.primary:active { background: #991e1e; }

@media (max-width: 700px) {
  body { padding: 6px; }
  #app { padding: 12px; gap: 12px; border-radius: 10px; }
  #sidebar { flex: 1 1 100%; }
  #board-wrapper { max-width: 100%; }
}
</style>
</head>
<body>
<div id="app">
<div id="left-col">
  <div id="header">
    <h1>当头炮布局谱训练</h1>
    <div id="opening-name">—</div>
  </div>
  <div id="board-wrapper">
    <canvas id="board-canvas"></canvas>
    <div id="pieces-container"></div>
  </div>
  <div id="status-bar">点击棋子选中，再点击绿色提示走棋</div>
</div>
<div id="sidebar">
  <div id="controls">
    <button id="undo-btn" disabled>退一手</button>
    <button id="redo-btn" disabled>进一手</button>
    <button id="hint-btn" class="primary">提示</button>
    <button id="teach-btn" class="teaching">教学</button>
    <button id="reset-btn">新局</button>
  </div>
  <div id="move-history">
    <h3>着法记录</h3>
    <ul id="move-list"></ul>
  </div>
  <div id="teaching-panel">
    <h3>当前着法解析</h3>
    <div id="move-desc">—</div>
    <div id="annotation-text"></div>
  </div>
  <div id="variations">
    <h3>布局变着</h3>
    <div id="variation-list"><span style="color:#7a5a3a;font-size:13px;">走棋后显示可选变着</span></div>
  </div>
</div>
</div>

<div id="dialog-overlay">
  <div id="dialog-box">
    <p>此着并非标准棋谱变招</p>
    <div class="sub">是否查看建议的谱着？</div>
    <div id="dialog-book-move" class="book-move"></div>
    <div class="btn-row">
      <button id="dialog-accept" class="primary">走谱着</button>
      <button id="dialog-ignore">继续自由走棋</button>
      <button id="dialog-cancel">取消</button>
    </div>
  </div>
</div>

<script>
// ====================================================================
// 1. 布局计算
// ====================================================================
let L = {};
function calcLayout() {
  const wrapper = document.getElementById('board-wrapper');
  const avail = wrapper.clientWidth || 508;
  const baseBoardW = 38 * 2 + 8 * 54;
  const s = Math.min(1, avail / baseBoardW);
  L = {
    cw: 54 * s, ch: 54 * s, px: 38 * s, py: 38 * s,
    rg: 30 * s, ps: 46 * s, fs: 22 * s, s: s,
  };
}
function rowY(r) { return L.py + r * L.ch + (r >= 5 ? L.rg - L.ch : 0); }
const ROWS = 10, COLS = 9;

// ====================================================================
// 2. 常量
// ====================================================================
const PIECE_NAMES = {
  K: { red: '帅', black: '将' },
  A: { red: '仕', black: '士' },
  E: { red: '相', black: '象' },
  R: { red: '车', black: '车' },
  H: { red: '马', black: '马' },
  C: { red: '炮', black: '炮' },
  P: { red: '兵', black: '卒' },
};
const PIECE_FROM_CHAR = {};
for (const [k, v] of Object.entries(PIECE_NAMES)) {
  PIECE_FROM_CHAR[v.red] = k; PIECE_FROM_CHAR[v.black] = k;
}
const CN_NUMS = ['０','一','二','三','四','五','六','七','八','九'];
const RED_LABELS = ['九','八','七','六','五','四','三','二','一'];
const BLACK_LABELS = ['１','２','３','４','５','６','７','８','９'];

// ====================================================================
// 3. 完整棋规验证器
// ====================================================================
const Validator = {
  inBoard(r, c) { return r >= 0 && r < 10 && c >= 0 && c < 9; },
  inPalace(r, c, color) {
    if (c < 3 || c > 5) return false;
    return color === 'red' ? (r >= 7 && r <= 9) : (r >= 0 && r <= 2);
  },
  ownSide(r, color) { return color === 'red' ? r >= 5 : r <= 4; },

  getValidMoves(r, c, boardState) {
    const piece = boardState[r][c];
    if (!piece) return [];
    const { type, color } = piece;
    const moves = [];
    const addIf = (tr, tc) => {
      if (!this.inBoard(tr, tc)) return;
      const target = boardState[tr][tc];
      if (target && target.color === color) return;
      moves.push([tr, tc]);
    };
    switch (type) {
      case 'K': // 将/帅：九宫内一步
        for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          const nr = r+dr, nc = c+dc;
          if (this.inPalace(nr, nc, color)) addIf(nr, nc);
        }
        // 将帅对脸（飞将）：同列无阻隔可吃对方将
        {
          const enemyColor = color === 'red' ? 'black' : 'red';
          for (let nr = r-1; nr >= 0; nr--) {
            const t = boardState[nr][c];
            if (t) {
              if (t.type === 'K' && t.color === enemyColor) { /* 飞将规则在 kingsExposed 中处理, 不作为走法返回 */ }
              break;
            }
          }
        }
        break;
      case 'A': // 仕/士：九宫斜走一步
        for (const [dr, dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
          const nr = r+dr, nc = c+dc;
          if (this.inPalace(nr, nc, color)) addIf(nr, nc);
        }
        break;
      case 'E': // 相/象：田字对角，防塞象眼
        for (const [dr, dc] of [[-2,-2],[-2,2],[2,-2],[2,2]]) {
          const nr = r+dr, nc = c+dc;
          if (!this.inBoard(nr, nc) || !this.ownSide(nr, color)) continue;
          const eyeR = (r + nr) / 2, eyeC = (c + nc) / 2;
          if (boardState[eyeR][eyeC]) continue; // 塞象眼
          addIf(nr, nc);
        }
        break;
      case 'R': // 车：直线不限距离
        for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          let nr = r+dr, nc = c+dc;
          while (this.inBoard(nr, nc)) {
            const t = boardState[nr][nc];
            if (t) { if (t.color !== color) moves.push([nr, nc]); break; }
            moves.push([nr, nc]); nr += dr; nc += dc;
          }
        }
        break;
      case 'H': // 马：日字对角，防蹩马腿
        {
          const legs = [
            [-1, 0, -2, -1], [-1, 0, -2, 1],
            [ 1, 0,  2, -1], [ 1, 0,  2, 1],
            [ 0,-1, -1, -2], [ 0,-1,  1, -2],
            [ 0, 1, -1,  2], [ 0, 1,  1,  2],
          ];
          for (const [lr, lc, tr, tc] of legs) {
            const legR = r + lr, legC = c + lc;
            if (!this.inBoard(legR, legC) || boardState[legR][legC]) continue;
            addIf(r + tr, c + tc);
          }
        }
        break;
      case 'C': // 炮：直线不限，吃子需隔一子
        for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
          let nr = r+dr, nc = c+dc, jumped = false;
          while (this.inBoard(nr, nc)) {
            const t = boardState[nr][nc];
            if (!jumped) {
              if (t) jumped = true;
              else moves.push([nr, nc]);
            } else {
              if (t) { if (t.color !== color) moves.push([nr, nc]); break; }
            }
            nr += dr; nc += dc;
          }
        }
        break;
      case 'P': // 兵/卒：未过河只能前进，过河可横走
        if (color === 'red') {
          addIf(r-1, c);
          if (r <= 4) { addIf(r, c-1); addIf(r, c+1); }
        } else {
          addIf(r+1, c);
          if (r >= 5) { addIf(r, c-1); addIf(r, c+1); }
        }
        break;
    }
    return moves;
  },

  // 将帅对脸检测
  kingsExposed(boardState) {
    let redK = null, blackK = null;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = boardState[r][c];
        if (p && p.type === 'K') {
          if (p.color === 'red') redK = [r, c];
          else blackK = [r, c];
        }
      }
    }
    if (!redK || !blackK || redK[1] !== blackK[1]) return false;
    for (let r = Math.min(redK[0], blackK[0]) + 1; r < Math.max(redK[0], blackK[0]); r++) {
      if (boardState[r][redK[1]]) return false;
    }
    return true;
  },

  // 某方是否被将军
  isInCheck(boardState, color) {
    let kingPos = null;
    for (let r = 0; r < ROWS && !kingPos; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = boardState[r][c];
        if (p && p.type === 'K' && p.color === color) { kingPos = [r, c]; break; }
      }
    }
    if (!kingPos) return true;
    // 飞将检查
    const enemyColor = color === 'red' ? 'black' : 'red';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = boardState[r][c];
        if (p && p.color === enemyColor) {
          for (const [mr, mc] of this.getValidMoves(r, c, boardState)) {
            if (mr === kingPos[0] && mc === kingPos[1]) return true;
          }
        }
      }
    }
    return false;
  },

  // 检查某步走法是否合法（不送将）
  isMoveLegal(boardState, fromR, fromC, toR, toC, color) {
    const newBoard = boardState.map(row => [...row]);
    newBoard[toR][toC] = newBoard[fromR][fromC];
    newBoard[fromR][fromC] = null;
    // 不能送将
    if (this.isInCheck(newBoard, color)) return false;
    // 不能将帅对脸
    if (this.kingsExposed(newBoard)) return false;
    return true;
  },

  // 检测某方是否被将杀
  isCheckmate(boardState, color) {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const p = boardState[r][c];
        if (!p || p.color !== color) continue;
        for (const [tr, tc] of this.getValidMoves(r, c, boardState)) {
          const newBoard = boardState.map(row => [...row]);
          newBoard[tr][tc] = newBoard[r][c];
          newBoard[r][c] = null;
          if (!this.isInCheck(newBoard, color) && !this.kingsExposed(newBoard)) return false;
        }
      }
    }
    return true; // 无合法着法 = 将杀
  },
};

// ====================================================================
// 4. 棋谱树结构 (支持多分支 + 标注)
// ====================================================================
/**
 * PgnNode — 棋谱树节点
 *   children: [{ move: {fromR,fromC,toR,toC}, node: PgnNode, mainLine: bool }]
 *   name: 开局/变体名称
 *   comment: 战术注解
 *   moveDesc: 本步中文描述
 */
class PgnNode {
  constructor() {
    this.children = [];
    this.name = '';
    this.comment = '';
    this.moveDesc = '';
  }
  addChild(move, mainLine) {
    const child = { move, node: new PgnNode(), mainLine: !!mainLine };
    this.children.push(child);
    return child.node;
  }
  findChild(move) {
    for (const child of this.children) {
      if (child.move.fromR === move.fromR && child.move.fromC === move.fromC &&
          child.move.toR === move.toR && child.move.toC === move.toC) {
        return child;
      }
    }
    return null;
  }
  hasMultipleBranches() {
    return this.children.length > 1;
  }
  getMainLineChild() {
    for (const child of this.children) if (child.mainLine) return child;
    return this.children.length > 0 ? this.children[0] : null;
  }
}

// ====================================================================
// 5. 棋谱行走器 (BookWalker)
// ====================================================================
class BookWalker {
  constructor(root) {
    this.root = root;
    this.current = root;
    this.path = []; // 走过的 child 记录
  }
  /** 在当前节点找匹配子节点，前进 */
  advance(move) {
    const child = this.current.findChild(move);
    if (!child) return null;
    this.path.push({ from: this.current, child });
    this.current = child.node;
    return child;
  }
  /** 退一手 */
  retreat() {
    if (this.path.length === 0) return false;
    const entry = this.path.pop();
    this.current = entry.from;
    return true;
  }
  /** 获取当前节点的所有变着 */
  getVariations() {
    return this.current.children.map((child, idx) => ({
      move: child.move,
      name: child.node.name || '',
      comment: child.node.comment || '',
      mainLine: child.mainLine,
      index: idx,
    }));
  }
  /** 从根节点沿 moveStack 重建路径 */
  rebuild(moveStack) {
    this.current = this.root;
    this.path = [];
    for (const m of moveStack) {
      const child = this.advance({ fromR: m.fromR, fromC: m.fromC, toR: m.toR, toC: m.toC });
      if (!child) return false;
    }
    return true;
  }
  /** 当前是否在谱 */
  isInBook() { return this.current !== null; }
  /** 当前节点是否还有后续 */
  hasNext() { return this.current.children.length > 0; }
  /** 获取当前节点的名称（开局/变体名） */
  getCurrentName() {
    if (this.path.length === 0) return '当头炮';
    // 从最近的有 name 的祖先节点回溯
    for (let i = this.path.length - 1; i >= 0; i--) {
      if (this.path[i].child.node.name) return this.path[i].child.node.name;
    }
    return '当头炮';
  }
  /** 获取当前应走的谱着（主变第一着） */
  getBookHint() {
    const main = this.current.getMainLineChild();
    if (main) return main;
    return this.current.children[0] || null;
  }
  /** 获取当前节点的注解（优先当前，其次父节点已落子注解） */
  getComment() { return this.current.comment || ''; }
  /** 获取当前步的描述 */
  getMoveDesc() { return this.current.moveDesc || ''; }
}

// ====================================================================
// 7. 记谱转换 (坐标 → 中文)
// ====================================================================
function getMoveNotation(move, piece) {
  if (!piece) return '??';
  const char = piece.char;
  const fromC = move.fromC, toC = move.toC, fromR = move.fromR, toR = move.toR;
  const isHorizontal = fromR === toR;
  const isRed = piece.color === 'red';
  const dir = isHorizontal ? '平'
    : (isRed ? (toR < fromR ? '进' : '退') : (toR > fromR ? '进' : '退'));
  const colNum = isRed ? (9 - fromC) : (fromC + 1);
  let num2;
  if (isHorizontal) {
    num2 = isRed ? (9 - toC) : (toC + 1);
  } else {
    const isHorse = piece.type === 'H' || piece.type === 'A' || piece.type === 'E';
    // 马/仕/相用终点列数，其他用步数
    if (piece.type === 'H' || piece.type === 'A' || piece.type === 'E') {
      num2 = isRed ? (9 - toC) : (toC + 1);
    } else {
      num2 = Math.abs(toR - fromR);
    }
  }
  const tn = n => (n >= 0 && n <= 9) ? CN_NUMS[n] : String(n);
  return `${char}${tn(colNum)}${dir}${tn(num2)}`;
}

let board = [];
let moveStack = [];    // 已走的棋 { fromR,fromC,toR,toC, piece, captured, notation }
let redoStack = [];
let selectedR = -1, selectedC = -1;
let currentPlayer = 'red';
let hintsVisible = false;
let teachingMode = false;

let currentOpeningName = '当头炮';

function initBoard() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  const PI = PIECE_NAMES;
  const redBack = ['R','H','E','A','K','A','E','H','R'];
  for (let c = 0; c < 9; c++) board[9][c] = { type: redBack[c], color: 'red', char: PI[redBack[c]].red };
  board[7][1] = { type: 'C', color: 'red', char: PI.C.red };
  board[7][7] = { type: 'C', color: 'red', char: PI.C.red };
  for (let c = 0; c < 9; c += 2) board[6][c] = { type: 'P', color: 'red', char: PI.P.red };
  const blackBack = ['R','H','E','A','K','A','E','H','R'];
  for (let c = 0; c < 9; c++) board[0][c] = { type: blackBack[c], color: 'black', char: PI[blackBack[c]].black };
  board[2][1] = { type: 'C', color: 'black', char: PI.C.black };
  board[2][7] = { type: 'C', color: 'black', char: PI.C.black };
  for (let c = 0; c < 9; c += 2) board[3][c] = { type: 'P', color: 'black', char: PI.P.black };
  moveStack = []; redoStack = [];
  selectedR = -1; selectedC = -1; hintsVisible = false; teachingMode = false;
  currentPlayer = 'red';
  bookWalker = new BookWalker(ROOT);
  currentOpeningName = '当头炮';
  pendingDialog = null;
  document.getElementById('dialog-overlay').classList.remove('visible');
  document.getElementById('teach-btn').classList.remove('active');
}

// ====================================================================
// 9. 核心走法执行
// ====================================================================
function executeMove(fromR, fromC, toR, toC) {
  const piece = board[fromR][fromC];
  if (!piece) return false;

  // 校验：基本走法合法性
  const validMoves = Validator.getValidMoves(fromR, fromC, board);
  const isValid = validMoves.some(([tr, tc]) => tr === toR && tc === toC);
  if (!isValid) return false;

  // 校验：不送将
  if (!Validator.isMoveLegal(board, fromR, fromC, toR, toC, currentPlayer)) return false;

  const captured = board[toR][toC];
  const newBoard = board.map(row => [...row]);
  newBoard[toR][toC] = piece;
  newBoard[fromR][fromC] = null;

  const moveRecord = { fromR, fromC, toR, toC, piece: { ...piece }, captured };
  moveRecord.notation = getMoveNotation(moveRecord, piece);

  moveStack.push(moveRecord);
  redoStack = [];
  board = newBoard;
  selectedR = -1; hintsVisible = false;

  // 棋谱树追踪
  const move = { fromR, fromC, toR, toC };
  const child = bookWalker.advance(move);
  if (child) {
    currentOpeningName = bookWalker.getCurrentName();
    // 完成提示
    if (!bookWalker.hasNext() && child.node.name) {
      setTimeout(() => alert(`🎉 已完成「${child.node.name}」全部着法！\n\n可继续自由走棋练习。`), 150);
    }
  } else {
    currentOpeningName = '已脱谱 · 自由走棋';
  }

  currentPlayer = currentPlayer === 'red' ? 'black' : 'red';
  updateUI();

  // 将杀检测
  if (Validator.isCheckmate(board, currentPlayer)) {
    const winner = currentPlayer === 'red' ? '黑方' : '红方';
    setTimeout(() => alert(`🏆 将杀！${winner}胜！`), 200);
  } else if (Validator.isInCheck(board, currentPlayer)) {
    setTimeout(() => document.getElementById('status-bar').textContent = '⚠️ 将军！', 50);
  }

  return true;
}

function undoMove() {
  if (moveStack.length === 0) return;
  const last = moveStack.pop();
  redoStack.push(last);
  board[last.fromR][last.fromC] = last.piece;
  board[last.toR][last.toC] = last.captured;
  currentPlayer = currentPlayer === 'red' ? 'black' : 'red';
  selectedR = -1; hintsVisible = false;
  // 重建棋谱路径
  bookWalker = new BookWalker(ROOT);
  let ok = true;
  for (const m of moveStack) {
    if (!bookWalker.advance({ fromR: m.fromR, fromC: m.fromC, toR: m.toR, toC: m.toC })) {
      ok = false; break;
    }
  }
  currentOpeningName = ok ? bookWalker.getCurrentName() : '已脱谱 · 自由走棋';
  updateUI();
}

function redoMove() {
  if (redoStack.length === 0) return;
  const next = redoStack.pop();
  const piece = board[next.fromR][next.fromC];
  if (!piece) { redoStack.push(next); return; }
  if (!Validator.isMoveLegal(board, next.fromR, next.fromC, next.toR, next.toC, currentPlayer)) {
    redoStack.push(next); return;
  }
  board[next.toR][next.toC] = piece;
  board[next.fromR][next.fromC] = null;
  moveStack.push(next);
  currentPlayer = currentPlayer === 'red' ? 'black' : 'red';
  selectedR = -1; hintsVisible = false;

  bookWalker = new BookWalker(ROOT);
  let ok = true;
  for (const m of moveStack) {
    if (!bookWalker.advance({ fromR: m.fromR, fromC: m.fromC, toR: m.toR, toC: m.toC })) {
      ok = false; break;
    }
  }
  currentOpeningName = ok ? bookWalker.getCurrentName() : '已脱谱 · 自由走棋';
  updateUI();
}

// ====================================================================
// 10. 变着与脱谱交互
// ====================================================================
function tryExecuteOrWarn(fromR, fromC, toR, toC) {
  // 检查是否在谱中且是否为谱着
  const move = { fromR, fromC, toR, toC };
  const inBook = bookWalker.current.findChild(move);
  if (inBook) {
    executeMove(fromR, fromC, toR, toC);
    return;
  }
  // 不在谱中 — 检测是否有当前应当走的谱着
  if (bookWalker.current.children.length > 0) {
    const hint = bookWalker.getBookHint();
    if (hint) {
      const hintPiece = board[hint.move.fromR][hint.move.fromC];
      const hintNotation = hintPiece ? getMoveNotation(hint.move, hintPiece) : '';
      pendingDialog = { fromR, fromC, toR, toC, hintMove: hint.move, hintNotation };
      showOffBookDialog(hintNotation);
      return;
    }
  }
  // 完全脱谱或无提示，直接走
  executeMove(fromR, fromC, toR, toC);
}

function showOffBookDialog(hintNotation) {
  const overlay = document.getElementById('dialog-overlay');
  document.getElementById('dialog-book-move').textContent = `建议着法：${hintNotation}`;
  overlay.classList.add('visible');
}

function dismissDialog() {
  document.getElementById('dialog-overlay').classList.remove('visible');
  pendingDialog = null;
}

function acceptHintMove() {
  if (!pendingDialog) return;
  const m = pendingDialog.hintMove;
  dismissDialog();
  executeMove(m.fromR, m.fromC, m.toR, m.toC);
}

function ignoreHintMove() {
  if (!pendingDialog) return;
  const m = pendingDialog;
  dismissDialog();
  executeMove(m.fromR, m.fromC, m.toR, m.toC);
}

document.getElementById('dialog-accept').addEventListener('click', acceptHintMove);
document.getElementById('dialog-ignore').addEventListener('click', ignoreHintMove);
document.getElementById('dialog-cancel').addEventListener('click', dismissDialog);

// ====================================================================
// 11. UI 渲染
// ====================================================================
const canvas = document.getElementById('board-canvas');
const ctx = canvas.getContext('2d');
const piecesContainer = document.getElementById('pieces-container');

function getBoardPixelSize() {
  return { w: L.px * 2 + (COLS - 1) * L.cw, h: rowY(9) + L.py };
}

function drawBoard() {
  const dpr = window.devicePixelRatio || 1;
  const { w, h } = getBoardPixelSize();
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  ctx.fillStyle = '#e8c88a';
  ctx.fillRect(0, 0, w, h);

  const left = L.px, right = L.px + (COLS-1) * L.cw;
  const top = L.py, bot = rowY(9);
  const midTop = rowY(4), midBot = rowY(5);

  ctx.strokeStyle = '#5c2e00';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(left - 8, top - 8, right - left + 16, bot - top + 16);

  ctx.strokeStyle = '#5c2e00';
  ctx.lineWidth = 1.2;
  for (let r = 0; r < 10; r++) {
    const y = rowY(r);
    ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
  }
  for (let c = 0; c < 9; c++) {
    const x = L.px + c * L.cw;
    if (c === 0 || c === 8) {
      ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, bot); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, midTop); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x, midBot); ctx.lineTo(x, bot); ctx.stroke();
    }
  }

  const bp_l = L.px + 3*L.cw, bp_r = L.px + 5*L.cw;
  ctx.beginPath(); ctx.moveTo(bp_l, rowY(0)); ctx.lineTo(bp_r, rowY(2)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bp_r, rowY(0)); ctx.lineTo(bp_l, rowY(2)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bp_l, rowY(7)); ctx.lineTo(bp_r, rowY(9)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bp_r, rowY(7)); ctx.lineTo(bp_l, rowY(9)); ctx.stroke();

  const riverFont = Math.max(14, Math.min(26, 26 * L.s));
  ctx.fillStyle = '#5c2e00';
  ctx.font = `bold ${riverFont}px "KaiTi","STKaiti","SimSun",serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const riverMid = (rowY(4) + rowY(5)) / 2;
  ctx.fillText('楚  河', left + 1.5 * L.cw, riverMid);
  ctx.fillText('汉  界', left + 6.5 * L.cw, riverMid);

  const starPoints = [[2,1],[2,7],[7,1],[7,7],[3,0],[3,2],[3,4],[3,6],[3,8],[6,0],[6,2],[6,4],[6,6],[6,8]];
  for (const [r,c] of starPoints) {
    const x = L.px + c * L.cw, y = rowY(r);
    const s = 4 * L.s, g = 2 * L.s;
    ctx.lineWidth = 1.2;
    for (const [dx,dy] of [[1,1],[1,-1],[-1,1],[-1,-1]]) {
      ctx.beginPath();
      ctx.moveTo(x+dx*g, y+dy*(g+s));
      ctx.lineTo(x+dx*g, y+dy*g);
      ctx.lineTo(x+dx*(g+s), y+dy*g);
      ctx.stroke();
    }
  }

  const labelFont = Math.max(9, Math.min(12, 12 * L.s));
  ctx.font = `${labelFont}px sans-serif`;
  ctx.fillStyle = '#5c2e00';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  for (let c = 0; c < 9; c++) ctx.fillText(RED_LABELS[c], L.px + c * L.cw, bot + 4);
  ctx.textBaseline = 'bottom';
  for (let c = 0; c < 9; c++) ctx.fillText(BLACK_LABELS[c], L.px + c * L.cw, top - 4);
}

function renderPieces() {
  piecesContainer.innerHTML = '';
  const frag = document.createDocumentFragment();

  // 教学模式下：高亮上一步棋的起落点
  if (teachingMode && moveStack.length > 0) {
    const lastMove = moveStack[moveStack.length - 1];
    const fromX = L.px + lastMove.fromC * L.cw;
    const fromY = rowY(lastMove.fromR);
    const toX = L.px + lastMove.toC * L.cw;
    const toY = rowY(lastMove.toR);

    const fromHL = document.createElement('div');
    fromHL.className = 'square-highlight from';
    fromHL.style.left = fromX + 'px'; fromHL.style.top = fromY + 'px';
    frag.appendChild(fromHL);

    const toHL = document.createElement('div');
    toHL.className = 'square-highlight to';
    toHL.style.left = toX + 'px'; toHL.style.top = toY + 'px';
    frag.appendChild(toHL);
  }

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const piece = board[r][c];
      if (!piece) continue;
      const x = L.px + c * L.cw, y = rowY(r);
      const el = document.createElement('div');
      el.className = `piece ${piece.color}`;
      if (selectedR === r && selectedC === c) el.classList.add('selected');
      el.textContent = piece.char;
      el.style.left = x + 'px'; el.style.top = y + 'px';
      el.style.width = L.ps + 'px'; el.style.height = L.ps + 'px';
      el.style.fontSize = L.fs + 'px';
      el.dataset.r = r; el.dataset.c = c;
      el.addEventListener('click', e => { e.stopPropagation(); onPieceClick(r, c); });
      el.addEventListener('touchstart', e => { e.preventDefault(); onPieceClick(r, c); }, {passive: false});
      frag.appendChild(el);
    }
  }
  piecesContainer.appendChild(frag);
}

function renderHints() {
  document.querySelectorAll('.hint-dot').forEach(el => el.remove());
  const bookMoves = getBookMoveSet();
  const frag = document.createDocumentFragment();

  // 1) 有选中棋子 → 只显示该棋子的谱着
  if (selectedR >= 0) {
    const piece = board[selectedR][selectedC];
    if (piece && piece.color === currentPlayer) {
      const moves = Validator.getValidMoves(selectedR, selectedC, board);
      for (const [tr, tc] of moves) {
        const key = `${selectedR},${selectedC}-${tr},${tc}`;
        if (bookMoves.has(key)) {
          addHintDot(tr, tc, board[tr][tc] !== null, frag);
        }
      }
    }
    // 如果没有谱着但有合法着，显示全部合法着
    if (!frag.hasChildNodes() && selectedR >= 0) {
      const piece = board[selectedR][selectedC];
      if (piece && piece.color === currentPlayer) {
        const moves = Validator.getValidMoves(selectedR, selectedC, board);
        for (const [tr, tc] of moves) {
          addHintDot(tr, tc, board[tr][tc] !== null, frag);
        }
      }
    }
    piecesContainer.appendChild(frag);
    return;
  }

  // 2) 无选中 → hintsVisible 模式下显示所有谱着
  if (!hintsVisible) { piecesContainer.appendChild(frag); return; }
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const piece = board[r][c];
      if (!piece || piece.color !== currentPlayer) continue;
      const moves = Validator.getValidMoves(r, c, board);
      for (const [tr, tc] of moves) {
        const key = `${r},${c}-${tr},${tc}`;
        if (bookMoves.has(key)) addHintDot(tr, tc, board[tr][tc] !== null, frag);
      }
    }
  }
  piecesContainer.appendChild(frag);
}

function addHintDot(r, c, isCapture, frag) {
  const x = L.px + c * L.cw, y = rowY(r);
  const el = document.createElement('div');
  const dotSize = Math.max(12, Math.min(20, 20 * L.s));
  el.className = 'hint-dot';
  el.style.left = x + 'px'; el.style.top = y + 'px';
  el.style.width = dotSize + 'px'; el.style.height = dotSize + 'px';
  el.style.background = isCapture ? 'rgba(220,50,50,0.45)' : 'rgba(0,200,80,0.55)';
  el.style.border = `2px solid ${isCapture ? 'rgba(200,40,40,0.7)' : 'rgba(0,180,60,0.8)'}`;
  const handler = (e) => {
    e.stopPropagation();
    if (selectedR >= 0) {
      const p = board[selectedR][selectedC];
      if (p && p.color === currentPlayer) {
        tryExecuteOrWarn(selectedR, selectedC, r, c);
        return;
      }
    }
    // Fallback: 找哪个己方棋子可以走到这里
    for (let pr = 0; pr < ROWS; pr++) {
      for (let pc = 0; pc < COLS; pc++) {
        const p = board[pr][pc];
        if (p && p.color === currentPlayer) {
          if (Validator.getValidMoves(pr, pc, board).some(([tr, tc]) => tr === r && tc === c)) {
            tryExecuteOrWarn(pr, pc, r, c);
            return;
          }
        }
      }
    }
  };
  el.addEventListener('click', handler);
  el.addEventListener('touchstart', e => { e.preventDefault(); handler(e); }, {passive: false});
  frag.appendChild(el);
}

function getBookMoveSet() {
  const set = new Set();
  for (const child of bookWalker.current.children) {
    set.add(`${child.move.fromR},${child.move.fromC}-${child.move.toR},${child.move.toC}`);
  }
  return set;
}

// ====================================================================
// 12. 教学面板
// ====================================================================
function updateTeachingPanel() {
  const panel = document.getElementById('teaching-panel');
  const descEl = document.getElementById('move-desc');
  const annotEl = document.getElementById('annotation-text');

  if (!teachingMode) {
    panel.classList.remove('visible');
    return;
  }
  panel.classList.add('visible');

  // 当前步的描述
  if (bookWalker.current.moveDesc) {
    descEl.textContent = bookWalker.current.moveDesc;
  } else if (moveStack.length > 0) {
    const lastMove = moveStack[moveStack.length - 1];
    const side = lastMove.piece.color === 'red' ? '红方' : '黑方';
    descEl.textContent = `${side} ${lastMove.notation}`;
  } else {
    descEl.textContent = '开局准备 · 红方先走';
  }

  // 注解
  const comment = bookWalker.current.comment;
  if (comment) {
    annotEl.textContent = '📌 ' + comment;
  } else {
    // 尝试从最近的有注解的祖先取
    let found = '';
    for (let i = bookWalker.path.length - 1; i >= 0; i--) {
      const c = bookWalker.path[i].child.node.comment;
      if (c) { found = c; break; }
    }
    annotEl.textContent = found ? '📌 ' + found : '';
  }
}

// ====================================================================
// 13. UI 更新聚合
// ====================================================================
function updateUI() {
  renderPieces();
  renderHints();
  updateMoveHistory();
  updateControls();
  updateOpeningName();
  updateStatus();
  updateVariations();
  updateTeachingPanel();
}

function toggleTeachingMode() {
  teachingMode = !teachingMode;
  document.getElementById('teach-btn').classList.toggle('active', teachingMode);
  updateUI();
  if (teachingMode && bookWalker.current.hasMultipleBranches()) {
    // 自动提示分支
    updateVariations();
  }
}

function updateMoveHistory() {
  const list = document.getElementById('move-list');
  list.innerHTML = '';
  for (let i = 0; i < moveStack.length; i += 2) {
    const num = Math.floor(i / 2) + 1;
    const li = document.createElement('li');
    li.innerHTML = `<span class="num">${num}.</span> ${moveStack[i].notation}`;
    if (i === moveStack.length - 1 || (i + 1 === moveStack.length - 1 && moveStack.length % 2 === 0)) {
      li.classList.add('active');
    }
    list.appendChild(li);
    if (i + 1 < moveStack.length) {
      const li2 = document.createElement('li');
      li2.innerHTML = `${moveStack[i+1].notation}`;
      if (i + 1 === moveStack.length - 1) li2.classList.add('active');
      list.appendChild(li2);
    }
  }
}

function updateControls() {
  document.getElementById('undo-btn').disabled = moveStack.length === 0;
  document.getElementById('redo-btn').disabled = redoStack.length === 0;
}

function updateOpeningName() {
  const el = document.getElementById('opening-name');
  el.textContent = currentOpeningName;
}

function updateStatus() {
  const el = document.getElementById('status-bar');
  if (selectedR >= 0) {
    const piece = board[selectedR][selectedC];
    if (piece && piece.color === currentPlayer) {
      el.textContent = `选中 ${piece.char}，点击绿色提示位置走棋`;
    } else {
      el.textContent = `当前 ${currentPlayer === 'red' ? '红' : '黑'}方走棋，请点击己方棋子`;
    }
  } else {
    el.textContent = `当前 ${currentPlayer === 'red' ? '红' : '黑'}方走棋，点击棋子选中`;
  }
}

function updateVariations() {
  const container = document.getElementById('variation-list');
  container.innerHTML = '';
  const vars = bookWalker.getVariations();
  if (vars.length === 0) {
    container.innerHTML = '<span style="color:#7a5a3a;font-size:13px;">无可选变着</span>';
    return;
  }
  // 如果只有一个子节点，显示主变名称
  if (vars.length === 1 && vars[0].name) {
    const span = document.createElement('span');
    span.style.cssText = 'color:#7a5a3a;font-size:13px;';
    span.textContent = vars[0].name;
    container.appendChild(span);
    return;
  }
  for (const v of vars) {
    const btn = document.createElement('button');
    btn.className = 'var-btn';
    const piece = board[v.move.fromR][v.move.fromC];
    const notation = piece ? getMoveNotation(v.move, piece) : '';
    btn.innerHTML = `${notation}${v.comment ? ' <span class="tag">💡</span>' : ''}`;
    btn.title = v.name || v.comment || '';
    btn.addEventListener('click', () => {
      // 直接执行此变着
      executeMove(v.move.fromR, v.move.fromC, v.move.toR, v.move.toC);
    });
    container.appendChild(btn);
  }
}

// ====================================================================
// 14. 点击处理器
// ====================================================================
function onPieceClick(r, c) {
  const piece = board[r][c];
  if (!piece) {
    selectedR = -1; hintsVisible = false; updateUI();
    return;
  }
  if (piece.color === currentPlayer) {
    selectedR = r; selectedC = c; hintsVisible = false;
    updateUI();
  } else if (selectedR >= 0) {
    // 尝试吃子走法
    tryExecuteOrWarn(selectedR, selectedC, r, c);
  }
}

// ====================================================================
// 15. 全量渲染 & 事件绑定
// ====================================================================
function fullRender() {
  calcLayout();
  drawBoard();
  updateUI();
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(fullRender, 150);
});
window.addEventListener('orientationchange', () => {
  setTimeout(fullRender, 300);
});

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undoMove(); }
  else if (e.ctrlKey && e.key === 'z' && e.shiftKey) { e.preventDefault(); redoMove(); }
  else if (e.key === 'h' || e.key === 'H') { e.preventDefault(); hintsVisible = !hintsVisible; updateUI(); }
  else if (e.key === 'r' || e.key === 'R') { e.preventDefault(); initBoard(); fullRender(); }
  else if (e.key === 't' || e.key === 'T') { e.preventDefault(); toggleTeachingMode(); }
});

document.getElementById('undo-btn').addEventListener('click', undoMove);
document.getElementById('redo-btn').addEventListener('click', redoMove);
document.getElementById('hint-btn').addEventListener('click', () => { hintsVisible = !hintsVisible; updateUI(); });
document.getElementById('teach-btn').addEventListener('click', toggleTeachingMode);
document.getElementById('reset-btn').addEventListener('click', () => { initBoard(); fullRender(); });

// 点击空白取消选中
document.addEventListener('click', () => {
  if (selectedR >= 0 || hintsVisible) { selectedR = -1; hintsVisible = false; updateUI(); }
});
// 空白取消不干扰棋盘点击
document.getElementById('board-wrapper').addEventListener('click', e => e.stopPropagation());

// ====================================================================
// 16. 启动
// ====================================================================
initBoard();
fullRender();
</script>
